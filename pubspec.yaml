name: easy_compress_assistant
description: "A utility for easy compressing"
publish_to: 'You'
version: 1.0.1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  fluent_ui: ^4.13.0
  path_provider: ^2.1.1
  archive: ^3.4.10
  permission_handler: ^11.0.1
  file_selector: ^1.0.3
  flutter_local_notifications: ^17.2.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true
  assets:
    - assets/images/qr_code.png
